<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Mikey AI — San Diego Black Car</title>
<meta name="description" content="Chat with Mikey AI to get instant luxury car quotes, book rides, and plan your San Diego experience."/>
<link rel="canonical" href="https://www.sandiegoblackcarservice.com/mikey"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#070707;--deep:#0d0d0d;--card:#131313;--panel:#1a1a1a;
  --rim:#222;--border:#2d2d2d;
  --gold:#C9A96E;--gold-pale:#e8d5a8;--gold-dim:#7a6030;--gold-glow:rgba(201,169,110,0.1);
  --cream:#f0ede8;--mist:#888480;--soft:#4e4c49;
  --green:#2ecc71;--red:#e74c3c;--amber:#f0a500;--teal:#00d4aa;
  --vip:#b8860b;--vip-glow:rgba(184,134,11,0.12);
  --font-d:'Cormorant Garamond',serif;
  --font-u:'Montserrat',sans-serif;
  --font-m:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--ink);color:var(--cream);font-family:var(--font-u);font-weight:300;overflow:hidden;}
body{background:radial-gradient(ellipse 90% 60% at 50% 0%,#1a1410 0%,#0d0c0b 35%,var(--ink) 70%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:0.04;background-image:url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW17e3t1dXWBgYGHh4t5eXlzc3OLi4ubm5uVlZWPj4+NjY19fX2JiYl/f39ra2uRkZGZmZlpaWmXl5dvb29xcXGTk5NnZ2c8TV1mAAAAG3RSTlNAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEAvEOwtAAAFVklEQVR4XpWWB67c2BUFb3g557T/hRo9/WUMZHlgr4Bg8Z4qQgQJlHI4A8SzFVrapvmTF9O7dmYRFZ60YiBhJRCgh1FYhiLAmdvX0CzTOpNE77ME0Zty/nWWzchDtiqrmQDeuv3powQ5ta2eN0FY0InkqDD73lT9c9lEzwUNqgFHs9VQce3TVClFCQrSTfOiYkVJQBmpbq2L6iZavPnAPcoU0dSw0SUTqz/GtrGuXfbyyBniKykOWQWGqwwMA7QiYAxi+IlPdqo+hYHnUt5ZPfnsHJyNiDtnpJyayNBkF6cWoYGAMY92ZBFGfEQTO96mSqBo19pShA0//g44ClBbgJ7kTu0HhPQyeYoGfBs3jGrIJFoTkgxpSmrLSJJhLh98mEhCXlMBsGnE0XYWoM/k5jV4/xE1mjwPVOoGy0Ar4Y2GVn8/8vzzJ1uh/y9FIiGO7w/tMSMKJQC2bBYRFbC0Y0m4v8Q4Z6cPKqzX2YBxkGCi1B+vEWGlEp6b3T9dZvD3/D0KT3GQNd+GGO2NuXz7C8pOE4VcfAAg2J2Lox5gJf5hYPcbFGxoXMVeRGH1CWPD+9l8i63KPsTd4m4lWYmkXRkNw0yJFBiNVQ+cHBYGBdh4iWnFyQAAAAAElFTkSuQmCC");background-repeat:repeat;background-size:128px;}

/* ─── SHELL ─── */
.shell{display:flex;flex-direction:column;height:100vh;height:100dvh;width:100%;max-width:640px;margin:0 auto;position:relative;}

/* ─── HEADER ─── */
.header{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);padding:13px 18px 11px;display:flex;align-items:center;gap:12px;position:relative;}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
.avatar{width:42px;height:42px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 35% 35%,#2a2015,#0f0c08);border:1.5px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:21px;color:var(--gold);position:relative;}
.avatar.vip-mode{border-color:var(--vip);box-shadow:0 0 12px var(--vip-glow);}
.status-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--card);transition:background .3s;}
.status-dot.thinking{background:var(--amber);animation:pulse .8s ease-in-out infinite;}
.status-dot.offline{background:var(--red);}
@keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
.brand{flex:1;min-width:0;}
.brand-name{font-family:var(--font-d);font-size:17px;font-weight:600;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;line-height:1.1;}
.brand-rule{width:28px;height:1px;background:var(--gold-dim);margin:4px 0;}
.brand-sub{font-size:9.5px;font-weight:300;color:var(--mist);letter-spacing:0.18em;text-transform:uppercase;}
.hdr-controls{display:flex;align-items:center;gap:7px;}
.hdr-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--mist);cursor:pointer;padding:6px 8px;font-size:12px;display:flex;align-items:center;gap:4px;transition:border-color .2s,color .2s;font-family:var(--font-u);}
.hdr-btn:hover{border-color:var(--gold-dim);color:var(--cream);}
.hdr-btn.active{border-color:var(--gold);color:var(--gold);}
.hdr-btn svg{width:14px;height:14px;}
.home-link{font-size:10px;letter-spacing:0.1em;text-decoration:none;}

/* VIP BANNER */
.vip-banner{background:var(--vip-glow);border-bottom:1px solid rgba(184,134,11,0.3);padding:5px 18px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--vip);text-align:center;display:none;}
.vip-banner.show{display:block;}

/* ─── LANG DROPDOWN ─── */
.lang-dropdown{position:absolute;top:calc(100% + 6px);right:18px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:300;box-shadow:0 16px 48px rgba(0,0,0,0.7);display:none;max-height:300px;overflow-y:auto;min-width:165px;}
.lang-dropdown.open{display:block;}
.lang-opt{padding:7px 11px;cursor:pointer;border-radius:5px;font-size:12px;color:var(--cream);transition:background .15s;display:flex;gap:8px;align-items:center;}
.lang-opt:hover,.lang-opt.sel{background:var(--rim);}
.lang-dropdown::-webkit-scrollbar{width:3px;}
.lang-dropdown::-webkit-scrollbar-thumb{background:var(--rim);}

/* ─── MESSAGES ─── */
.messages{flex:1;overflow-y:auto;padding:22px 18px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--rim);border-radius:2px;}

/* ─── BUBBLES ─── */
.msg{display:flex;gap:9px;align-items:flex-end;max-width:100%;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:var(--panel);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:13px;color:var(--gold);}
.msg-body{max-width:calc(100% - 46px);}
.bubble{padding:11px 15px;border-radius:9px;font-size:13.5px;line-height:1.68;word-break:break-word;}
.msg.assistant .bubble{background:var(--card);border:1px solid var(--border);color:var(--cream);border-bottom-left-radius:3px;}
.msg.user .bubble{background:transparent;border:none;color:var(--gold-pale);font-family:var(--font-d);font-size:15px;font-style:italic;text-align:right;padding-right:0;}
.bubble p{margin-bottom:7px;}.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--gold);font-weight:500;}
.bubble em{color:var(--mist);}
.bubble ul,.bubble ol{padding-left:16px;margin:5px 0;}
.bubble li{margin-bottom:3px;}
.bubble a{color:var(--gold);text-decoration:underline;}
.rtl .bubble{direction:rtl;text-align:right;}
.streaming::after{content:'▋';color:var(--gold);animation:blink .7s step-end infinite;}
@keyframes blink{50%{opacity:0;}}

/* ─── TYPING DOTS ─── */
.dots{display:flex;gap:4px;padding:3px 2px;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--gold-dim);animation:dotpop 1.4s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotpop{0%,80%,100%{transform:scale(.75);opacity:.35;}40%{transform:scale(1);opacity:1;}}

/* ─── CHIPS ─── */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:5px 11px;font-size:11.5px;cursor:pointer;color:var(--cream);transition:border-color .2s,background .2s;}
.chip:hover{border-color:var(--gold-dim);background:var(--rim);}

/* ─── QUOTE CARD ─── */
.qcard{margin-top:11px;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:9px;overflow:hidden;}
.qcard-head{padding:13px 15px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.qcard-vehicle{font-family:var(--font-d);font-size:15px;color:var(--gold);font-weight:600;}
.qcard-type{font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--mist);margin-top:2px;}
.qcard-price-wrap{text-align:right;}
.qcard-amount{font-family:var(--font-m);font-size:21px;color:var(--cream);letter-spacing:-0.02em;}
.qcard-currency{font-size:11px;color:var(--mist);}
.qcard-body{padding:11px 15px;}
.qcard-row{display:flex;justify-content:space-between;padding:2.5px 0;font-size:11.5px;}
.qcard-lbl{color:var(--mist);font-family:var(--font-m);letter-spacing:.04em;}
.qcard-val{color:var(--cream);font-family:var(--font-m);}
.qcard-sep{height:1px;background:var(--border);margin:8px 0;}
.qcard-conf{font-family:var(--font-m);font-size:9.5px;color:var(--gold-dim);letter-spacing:.1em;margin-top:3px;}
.qcard-foot{padding:11px 15px 13px;display:flex;gap:7px;}
.btn-pay{flex:1;padding:11px;background:var(--gold);border:none;border-radius:6px;cursor:pointer;font-family:var(--font-u);font-size:11.5px;font-weight:500;color:#060606;letter-spacing:.12em;text-transform:uppercase;transition:opacity .2s;}
.btn-pay:hover{opacity:.88;}
.btn-pay:disabled{opacity:.35;cursor:not-allowed;}
.btn-hold{padding:11px 14px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--mist);font-size:11.5px;transition:border-color .2s,color .2s;font-family:var(--font-u);}
.btn-hold:hover{border-color:var(--gold-dim);color:var(--cream);}

/* ─── MULTI-QUOTE COMPARISON CARD ─── */
.mqcard{margin-top:11px;background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--gold-dim);border-radius:9px;overflow:hidden;}
.mqcard-title{padding:10px 15px 8px;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mist);}
.mqcard-grid{display:grid;gap:1px;background:var(--border);}
.mqcard-grid.col-2{grid-template-columns:1fr 1fr;}
.mqcard-grid.col-3{grid-template-columns:1fr 1fr 1fr;}
.mqcard-option{background:var(--panel);padding:13px 12px;cursor:pointer;transition:background .15s;position:relative;}
.mqcard-option:hover{background:var(--rim);}
.mqcard-option.recommended::before{content:'BEST VALUE';position:absolute;top:7px;right:7px;font-family:var(--font-m);font-size:7px;letter-spacing:.1em;color:var(--teal);border:1px solid var(--teal);border-radius:3px;padding:1px 4px;}
.mqcard-opt-name{font-family:var(--font-d);font-size:13px;color:var(--gold);font-weight:600;line-height:1.2;margin-bottom:3px;}
.mqcard-opt-pax{font-size:9.5px;color:var(--mist);margin-bottom:7px;}
.mqcard-opt-price{font-family:var(--font-m);font-size:18px;color:var(--cream);}
.mqcard-opt-price-sub{font-size:9px;color:var(--mist);}

/* ─── DRIVER CARD ─── */
.driver-card{margin-top:8px;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:9px;padding:13px 15px;display:flex;align-items:center;gap:14px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.driver-av{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1a2a20,#0a130d);border:1.5px solid var(--teal);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:16px;color:var(--teal);flex-shrink:0;}
.driver-info{flex:1;min-width:0;}
.driver-name{font-family:var(--font-d);font-size:14px;color:var(--cream);font-weight:600;}
.driver-vehicle{font-size:10.5px;color:var(--mist);margin-top:2px;}
.driver-tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-top:4px;}
.driver-eta-wrap{text-align:right;flex-shrink:0;}
.driver-eta-num{font-family:var(--font-m);font-size:20px;color:var(--teal);}
.driver-eta-lbl{font-size:9px;color:var(--mist);letter-spacing:.12em;text-transform:uppercase;}

/* ─── WHATSAPP HANDOFF ─── */
.wa-handoff{margin-top:8px;background:rgba(37,211,102,0.06);border:1px solid rgba(37,211,102,0.25);border-radius:9px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;animation:slideIn .3s ease;}
.wa-text{font-size:12px;color:var(--cream);line-height:1.5;}
.wa-text strong{color:#25d366;font-weight:500;}
.wa-btn{display:flex;align-items:center;gap:7px;background:#25d366;color:#0a0a0a;border:none;border-radius:6px;padding:9px 14px;font-family:var(--font-u);font-size:11px;font-weight:500;letter-spacing:.08em;cursor:pointer;text-decoration:none;flex-shrink:0;transition:opacity .2s;}
.wa-btn:hover{opacity:.88;}
.wa-btn svg{width:14px;height:14px;}

/* ─── SECURITY BRIEF ─── */
.sec-card{margin-top:8px;background:rgba(240,165,0,0.05);border:1px solid rgba(240,165,0,0.2);border-radius:9px;padding:13px 15px;animation:slideIn .3s ease;}
.sec-header{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.sec-icon{width:20px;height:20px;color:var(--amber);}
.sec-title{font-family:var(--font-m);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber);}
.sec-items{display:flex;flex-direction:column;gap:5px;}
.sec-item{font-size:11.5px;color:var(--cream);line-height:1.5;display:flex;gap:8px;}
.sec-item::before{content:'✓';color:var(--amber);flex-shrink:0;font-family:var(--font-m);}

/* ─── UPSELL CARD ─── */
.upsell-card{margin-top:8px;background:var(--gold-glow);border:1px solid rgba(201,169,110,0.2);border-radius:9px;padding:13px 15px;animation:slideIn .3s ease;}
.upsell-header{font-family:var(--font-d);font-size:13px;color:var(--gold);margin-bottom:7px;font-weight:600;}
.upsell-body{font-size:11.5px;color:var(--mist);line-height:1.6;margin-bottom:10px;}
.upsell-chips{display:flex;gap:6px;flex-wrap:wrap;}
.upsell-chip{background:var(--rim);border:1px solid var(--gold-dim);border-radius:12px;padding:4px 10px;font-size:11px;color:var(--gold-pale);cursor:pointer;transition:border-color .2s;}
.upsell-chip:hover{border-color:var(--gold);}

/* ─── VENUE CARD ─── */
.vcard{margin-top:8px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:13px 15px;cursor:pointer;transition:border-color .2s;}
.vcard:hover{border-color:var(--gold-dim);}
.vcard-name{font-family:var(--font-d);font-size:14px;color:var(--gold);font-weight:600;}
.vcard-meta{font-size:10.5px;color:var(--mist);margin-top:3px;display:flex;gap:10px;}
.vcard-badge{background:var(--rim);border-radius:10px;padding:2px 7px;font-size:9.5px;color:var(--gold-pale);}
.vcard-foot{margin-top:9px;display:flex;gap:7px;}
.vcard-btn{padding:7px 13px;border:1px solid var(--border);border-radius:5px;font-size:11px;cursor:pointer;background:none;color:var(--cream);transition:border-color .2s;font-family:var(--font-u);}
.vcard-btn:hover{border-color:var(--gold);}
.vcard-btn.primary{background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold-pale);}

/* ─── LEG TRACKER ─── */
.leg-tracker{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-top:8px;}
.leg-tracker-lbl{color:var(--mist);font-family:var(--font-m);letter-spacing:.06em;}
.leg-tracker-val{color:var(--gold);font-family:var(--font-m);font-size:13px;}

/* ─── INPUT BAR ─── */
.input-area{flex-shrink:0;background:var(--card);border-top:1px solid var(--border);padding:11px 15px;padding-bottom:max(11px,env(safe-area-inset-bottom));}
.input-row{display:flex;gap:7px;align-items:flex-end;background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:7px 9px 7px 13px;transition:border-color .2s;}
.input-row:focus-within{border-color:var(--gold-dim);}
textarea#userInput{flex:1;background:none;border:none;outline:none;resize:none;color:var(--cream);font-family:var(--font-u);font-size:13.5px;line-height:1.5;max-height:110px;min-height:22px;}
textarea#userInput::placeholder{color:var(--soft);}
.ibar-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--mist);display:flex;align-items:center;transition:color .2s;flex-shrink:0;}
.ibar-btn:hover{color:var(--gold);}
.ibar-btn.active{color:var(--red);}
.ibar-btn svg{width:16px;height:16px;}
.send-btn{background:var(--gold-dim);border:none;border-radius:6px;padding:6px 9px;cursor:pointer;color:var(--ink);display:flex;align-items:center;transition:background .2s;}
.send-btn:hover{background:var(--gold);}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}
.send-btn svg{width:15px;height:15px;}
.input-hint{font-size:9.5px;color:var(--gold-dim);text-align:center;margin-top:6px;letter-spacing:.08em;opacity:.7;}
.upload-row{display:flex;gap:6px;align-items:center;margin-bottom:7px;}
.upload-label{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;color:var(--mist);transition:border-color .2s;font-family:var(--font-u);}
.upload-label:hover{border-color:var(--gold-dim);}
.upload-label svg{width:13px;height:13px;}
#fileInput{display:none;}
.upload-name{font-size:10.5px;color:var(--gold-pale);}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:9px 16px;font-size:11.5px;color:var(--cream);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:400;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.vip{border-color:var(--vip);color:var(--vip);}

/* ─── INTRO ─── */
.intro{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--gold-dim);border-radius:9px;padding:18px;}
.intro-title{font-family:var(--font-d);font-size:17px;color:var(--gold);font-weight:600;margin-bottom:5px;}
.intro-body{font-size:12.5px;color:var(--mist);line-height:1.75;margin-bottom:13px;}

/* ─── CONCIERGE CARD ─── */
.conc-card{margin-top:8px;background:linear-gradient(135deg,rgba(201,169,110,0.05) 0%,rgba(201,169,110,0.02) 100%);border:1px solid rgba(201,169,110,0.22);border-top:2px solid var(--gold-dim);border-radius:9px;padding:15px 15px 13px;animation:slideIn .3s ease;}
.conc-title{font-family:var(--font-d);font-size:14px;color:var(--gold);font-weight:600;margin-bottom:4px;}
.conc-sub{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:11px;}
.conc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:11px;}
.conc-item{background:var(--rim);border:1px solid var(--border);border-radius:6px;padding:9px 10px;cursor:pointer;transition:border-color .2s,background .2s;}
.conc-item:hover{border-color:var(--gold-dim);background:var(--panel);}
.conc-item-icon{font-size:14px;margin-bottom:4px;}
.conc-item-name{font-size:11px;color:var(--cream);font-family:var(--font-u);font-weight:400;line-height:1.3;}
.conc-item-desc{font-size:9.5px;color:var(--mist);margin-top:2px;}
/* ─── VIP ACCESS CARD ─── */
.vip-card{margin-top:8px;background:linear-gradient(135deg,rgba(184,134,11,0.08) 0%,rgba(184,134,11,0.03) 100%);border:1px solid rgba(184,134,11,0.3);border-top:2px solid var(--vip);border-radius:9px;padding:15px 15px 13px;animation:slideIn .3s ease;}
.vip-card-header{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.vip-card-icon{width:28px;height:28px;border-radius:50%;background:rgba(184,134,11,0.15);border:1px solid rgba(184,134,11,0.35);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.vip-card-title{font-family:var(--font-d);font-size:14px;color:var(--vip);font-weight:600;}
.vip-card-sub{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(184,134,11,0.6);margin-top:1px;}
.vip-perks{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
.vip-perk{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;color:var(--cream);line-height:1.4;}
.vip-perk::before{content:'◆';color:var(--vip);font-size:7px;margin-top:4px;flex-shrink:0;}
.vip-cta{background:rgba(184,134,11,0.15);border:1px solid rgba(184,134,11,0.3);border-radius:6px;padding:9px 13px;font-size:11.5px;color:var(--vip);cursor:pointer;font-family:var(--font-u);font-weight:400;width:100%;text-align:center;transition:background .2s;}
.vip-cta:hover{background:rgba(184,134,11,0.25);}

/* ─── ITINERARY CARD ─── */
.itin-card{margin-top:11px;background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--teal);border-radius:9px;overflow:hidden;animation:slideIn .3s ease;}
.itin-header{padding:13px 15px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.itin-title{font-family:var(--font-d);font-size:16px;color:var(--teal);font-weight:600;}
.itin-meta{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist);margin-top:3px;}
.itin-badge{font-family:var(--font-m);font-size:9px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);border-radius:4px;padding:3px 8px;color:var(--teal);}
.itin-days{padding:0 15px 13px;}
.itin-day{padding:11px 0;border-bottom:1px solid var(--border);}
.itin-day:last-child{border-bottom:none;}
.itin-day-label{font-family:var(--font-m);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
.itin-stops{display:flex;flex-direction:column;gap:5px;}
.itin-stop{display:flex;gap:10px;align-items:flex-start;font-size:12px;color:var(--cream);line-height:1.5;}
.itin-stop-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:6px;}
.itin-stop-note{font-size:10.5px;color:var(--mist);margin-top:1px;}
.itin-foot{padding:11px 15px 13px;display:flex;gap:7px;border-top:1px solid var(--border);}
.itin-btn{flex:1;padding:10px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);border-radius:6px;cursor:pointer;font-family:var(--font-u);font-size:11px;font-weight:500;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;transition:background .2s;}
.itin-btn:hover{background:rgba(0,212,170,0.2);}
.itin-btn-transport{flex:1;padding:10px;background:var(--gold-glow);border:1px solid var(--gold-dim);border-radius:6px;cursor:pointer;font-family:var(--font-u);font-size:11px;color:var(--gold-pale);letter-spacing:.1em;text-transform:uppercase;transition:background .2s;}
.itin-btn-transport:hover{background:rgba(201,169,110,0.15);}

/* ─── MOBILE ─── */
@media(max-width:480px){
  .shell{max-width:100%;}
  .header{padding:11px 14px 9px;}
  .messages{padding:16px 13px;}
  .input-area{padding:9px 12px;}
  .brand-name{font-size:15px;}
  .mqcard-grid.col-3{grid-template-columns:1fr 1fr;}
}

═══════════════════════════════════════════════════════════
MEXICO CITY — DEEP CULTURAL & HISTORICAL KNOWLEDGE
═══════════════════════════════════════════════════════════

CITY HISTORY — know this cold, share it naturally:

PRE-HISPANIC ERA:
- San Diego was founded as a Spanish mission city in 1769 — the first European settlement in Alta California. The Mission San Diego de Alcalá still stands in Mission Valley. Old Town San Diego preserves the original Mexican and Spanish-era buildings.
- Tenochtitlán was one of the largest cities on Earth by 1500 — population 200,000–300,000, larger than any European city at the time. It was connected to the mainland by four great causeways and had sophisticated aqueducts, floating gardens (chinampas), and a massive ceremonial center.
- The Templo Mayor (Great Temple) was the spiritual heart of the empire — a dual pyramid dedicated to Huitzilopochtli (war/sun) and Tlaloc (rain/water). Rediscovered in 1978 when electrical workers accidentally hit it under the streets of the Centro. Now a world-class museum and active excavation site.
- The Mexica built chinampa agriculture — artificial floating garden islands in the lake — still visible at Xochimilco today. One of humanity's great engineering achievements.
- Teotihuacán (Pyramid of the Sun, Pyramid of the Moon, Temple of the Feathered Serpent) predates the Aztec by 1,000 years — built by an unknown civilization around 100 BCE–550 CE. The Aztec believed it was where the gods created the world and the sun. Still not fully understood. One of the most visited archaeological sites on Earth.

SPANISH CONQUEST & COLONIAL ERA (1519–1821):
- Hernán Cortés arrived in 1519 with 500 men and allied with the Tlaxcalans — enemies of the Aztec — to defeat Tenochtitlán. The city fell on August 13, 1521, after an 80-day siege. Emperor Cuauhtémoc was captured and later executed.
- The Spanish built their colonial capital directly on top of Tenochtitlán — using the rubble of Aztec temples to build the Cathedral and the Palacio Nacional. The main Aztec plaza became the Zócalo (still the main square today). Every time they dig in the Centro, they find more ruins beneath.
- The Metropolitan Cathedral on the Zócalo — construction started 1573, finished 1813. 240 years to build. Sinking unevenly because it's built on the old lake bed — you can see it tilting. Contains 16 chapels, 5 naves, and the famous Altar de los Reyes.
- The Palacio Nacional — built on the site of Moctezuma's palace. Diego Rivera painted his monumental mural of Mexican history on the grand staircase — 1929 to 1951. Free to enter. The mural shows the full arc from Aztec civilization through the Revolution. One of the greatest artworks in the Americas.
- Coyoacán and San Ángel were separate colonial villages outside the city — now absorbed into the urban fabric but still retain their cobblestone streets, colonial plazas, and village feel.

INDEPENDENCE & 19TH CENTURY (1810–1910):
- Mexico declared independence from Spain on September 16, 1810 — Miguel Hidalgo rang the church bell in Dolores, Guanajuato (the Grito de Independencia). Every year on September 15 at 11pm, the President recreates it from the Zócalo balcony to 100,000+ people. Extraordinary event to witness.
- The French invaded in the 1860s — Emperor Maximilian I of Austria ruled Mexico 1864–1867 from Chapultepec Castle. He was eventually captured and executed. His wife Carlota went mad. The castle still has his throne room and quarters. Bizarre and fascinating slice of history.
- Paseo de la Reforma was modeled on the Champs-Élysées — built by Maximilian as a direct boulevard from the castle to the National Palace. Now lined with modern skyscrapers, embassies, and the Angel of Independence monument (El Ángel) — the city's most iconic landmark, built 1910 for the centennial of independence.

MEXICAN REVOLUTION & 20TH CENTURY (1910–1968):
- The Revolution (1910–1920) overthrew dictator Porfirio Díaz after 30 years in power. Figures like Emiliano Zapata (agrarian reform, the south) and Pancho Villa (the north) are still icons. The revolution's ideals shaped modern Mexican identity — land reform, workers' rights, nationalist art.
- The Muralist Movement emerged post-Revolution as state-sponsored public art — Diego Rivera, José Clemente Orozco, David Alfaro Siqueiros painted massive political murals in public buildings. The goal: tell Mexico's story to a largely illiterate population. Rivera's murals at the Palacio Nacional, Bellas Artes, and Chapultepec are essential viewing.
- Frida Kahlo (1907–1954) — painter, Communist, survivor of polio and a devastating bus accident, Diego Rivera's wife (twice). Her home in Coyoacán (La Casa Azul, The Blue House) is now the most visited museum in Mexico. Her work and life story are inseparable. Personal and political. Book tickets weeks ahead.

MODERN CDMX (1990s–present):
- Roma and Condesa were devastated in 1985 — much was rebuilt with thought, creating the café culture and art deco streetscape you see today. Ground zero of the city's creative class.
- Gentrification is real and contested — Roma Norte in particular has changed dramatically. Locals and expats in ongoing tension. Worth knowing if clients ask about the city's character.
- CDMX is technically not a state — it became Ciudad de México (a federal entity) in 2016, replacing the old Distrito Federal (D.F.) designation. Chilangos (CDMX natives) are fiercely proud of their city.

═══════════════════════════════════════════════════════════
SITES — DEEP KNOWLEDGE WITH INSIDER DETAILS
═══════════════════════════════════════════════════════════

HISTORY & ARCHAEOLOGY:
- Templo Mayor (Centro): The excavated heart of the Aztec empire, steps from the Zócalo. Museum has the Coyolxauhqui Stone — a 3.25-meter circular carved monolith found in 1978. Go early, it's rarely crowded. $80 MXN entry. Pair with the Zócalo and Metropolitan Cathedral for a full morning. 2–3 hours.
- Teotihuacán (50 km NE, 1 hour drive): Pyramid of the Sun is the third-largest pyramid on Earth. Climb it at sunrise before the crowds hit — we can arrange a 5:30am departure with a private Suburban. The Avenue of the Dead stretches 2.5 km. Bring sunscreen and water — fully exposed. Full day. Recommend pairing with a mezcal tasting in San Martín Texmelucan on the way back.
- Palacio Nacional (Zócalo): Free entry, no booking needed. Go straight to the grand staircase for Rivera's mural. Tuesdays–Sundays. Arrive before 11am for best light on the murals.
- Tlatelolco / Plaza de las Tres Culturas: Three civilizations in one plaza — Aztec ruins, the 17th-century Santiago de Tlatelolco church, and the 1960s apartment complex. Sobering and extraordinary. Free. The Tlatelolco market was where Hernán Cortés' chronicler Bernal Díaz del Castillo described a marketplace larger than Seville. Now underground beneath the square.
- Chapultepec Castle: Hilltop castle with the best view of the city. Maximilian's apartments, Carlota's quarters, and the roof terrace looking over Reforma. The history is wild — Habsburg royals, Mexican emperors, military cadets (the Niños Héroes), and now a museum. Closed Mondays. Worth 2 hours.

ART & CULTURE:
- Museo Nacional de Antropología (Chapultepec): The greatest museum in Latin America. The Aztec Sun Stone (often called the "Aztec Calendar") is here — 3.6 meters across, 24 tons. Also the jade death mask of Pakal of Palenque. Budget 3–4 hours minimum; a single room could take a whole day. Free on Sundays. Closed Mondays.
- Frida Kahlo Museum / La Casa Azul (Coyoacán): Her actual home, still feels lived-in. Her wheelchair, her corsets, her medicine cabinet, her ashes in a pre-Columbian urn. Book online weeks in advance — sells out constantly. Pair with wandering the Coyoacán market and the Plaza Hidalgo for a full half-day.
- Palacio de Bellas Artes (Centro): Art nouveau exterior, art deco interior — one of the most beautiful buildings in the Americas. Rivera, Orozco, and Siqueiros murals inside. The Rivera mural is a recreation of the famous Rockefeller Center mural that Nelson Rockefeller had destroyed for including Lenin. Free to enter the lobby and ground floor. Tiffany glass curtain stage drops at 8pm performances.
- Museo Soumaya (Plaza Carso, Polanco/Satélite border): Carlos Slim's private collection in a striking aluminum-tiled building. 66,000 pieces including the world's largest Rodin collection outside France. Free entry. Underrated — rarely crowded compared to Anthropología.
- Museo Jumex (next door to Soumaya): Contemporary art, rotating international exhibitions. Has hosted Warhol, Koons, Bourgeois. Small, excellent, air-conditioned. $80 MXN. A tight pairing with Soumaya — both in one morning.
- Muralismo in the wild: Diego Rivera murals at the Palacio Nacional (Zócalo) and the Museo de Arte Moderno. Orozco at the Escuela Nacional Preparatoria (San Ildefonso). Siqueiros at the Polyforum Siqueiros (Insurgentes) — his massive 3D mural "La Marcha de la Humanidad" covers the exterior AND interior of the building.
- Museo del Estanquillo (Centro): Carlos Monsiváis' personal collection of Mexican popular culture — prints, postcards, photos, comics, ephemera. Three floors in a gorgeous restored building. Free on Tuesdays. Often overlooked by tourists.

NEIGHBORHOODS FOR WANDERING:
- Coyoacán: Colonial cobblestone village swallowed by the city. Frida and Diego lived here. Leon Trotsky lived and was assassinated here (his house is a museum). The weekend market in the central plaza sells crafts, food, and Mexican kitsch. Best on Saturday morning. 45 min from Polanco in traffic.
- Roma Norte: The creative heart. Álvaro Obregón boulevard with cafés under the trees. The Mercado Medellín for fresh produce and antojitos. Street art on every other block. Parque México (an oval art deco park) is the neighborhood living room — go on a weekend morning. The best people-watching in the city.
- Polanco: Diplomatic, wealthy, polished. Presidente Masaryk is the luxury shopping street — Hermès, Louis Vuitton, Cartier, local designers. The restaurants here are serious. The parks are manicured. It feels like a different city from Roma.
- Centro Histórico: Layered and overwhelming in the best way. Book a guided walking tour (we can arrange). Best approached with a plan — Zócalo → Templo Mayor → Palacio Nacional → Bellas Artes → Alameda Central. Full morning minimum.
- Tepito: Famous flea market, raw and real — NOT for solo tourists, but fascinating for those who want to understand the real economic texture of the city. We arrange visits with Ivan personally — never solo.

FOOD & MARKETS (essential knowledge):
- Mercado de la Merced: The city's largest traditional market. Produce, dried chiles, flowers, religious items. Overwhelming and authentic. Best with a local guide.
- Mercado Jamaica: The flower market. Arrive early — the displays are extraordinary and it sells out. Used for Day of the Dead altars. Worth a 30-minute detour for anyone interested in Mexican aesthetics.
- Mercado Medellín (Roma): The neighborhood market with a Colombian section (Roma has a large Colombian expat community). Great breakfast — huevos, quesadillas, fresh juice.
- Street tacos worth knowing: El Vilsito (Narvarte, late night tacos al pastor — the trompo is a sight to behold), Los Cocuyos (Centro, offal tacos for the brave, opens at midnight), Taquería Los Parados (Roma, carnitas). The best tacos cost $15–25 MXN. Don't overthink it.

HIDDEN GEMS — things no guidebook covers adequately:
- Mercado Melchor Ocampo (Tlatelolco): Completely off the tourist map. The real local market serving the Tlatelolco neighborhood. Raw, cheap, delicious.
- Ex-Teresa Arte Actual (Centro): A converted 17th-century church turned contemporary art space. Hosts experimental performances and sound art. Free or cheap entry.
- Biblioteca Vasconcelos: The "megabiblioteca" — Enrique Norten's stunning glass and steel public library in Buenavista. A whale skeleton is suspended from the ceiling. Free to enter. Locals barely know how extraordinary it looks.
- Bosque de Chapultepec Section 2: Everyone goes to Section 1 (the museum corridor). Section 2 has the lake, the amusement park (Chapultepec Mágico), and the Papalote children's museum — far less crowded on weekdays.
- Mirador Torre Latinoamericana: The observation deck on the 44th floor of the Torre Latino — built 1956, survived both the 1957 and 1985 earthquakes. The city at sunset is extraordinary. $120 MXN. Often dismissed as touristy — it's genuinely spectacular.
- Parque Hundido (Insurgentes Sur): An underground park built into the old lake bed. Pre-Columbian replica sculptures dot the landscape. Joggers and families. Completely unhyped and peaceful.
- El Péndulo (Roma Norte and Polanco): Bookshop-café hybrid with live music, great coffee, and shelves going to the ceiling. The Roma Norte location has a mezzanine. Good for a mid-afternoon break.
- Cineteca Nacional (Insurgentes Sur): Mexico's premiere film archive and cinema complex. Shows international art house films, Mexican classics, retrospectives. The outdoor terrace is beautiful on a warm evening.

MEXICO CITY — DEEP KNOWLEDGE BASE:

HISTORY & CONTEXT (share this naturally, not as a lecture):
- Hernán Cortés conquered Tenochtitlán in 1521 with a coalition of rival indigenous tribes, not just Spanish forces — a nuance most tourists miss.
- The city was the capital of New Spain for 300 years before Mexican independence in 1821. That colonial architecture you see in Centro? It was built with stones from Aztec temples.
- The 1985 earthquake (8.1 magnitude) killed an estimated 10,000 people and fundamentally changed Mexican civil society — citizens organized themselves when the government failed, planting seeds of modern democratic movements.
- CDMX became an official "ciudad" (not just a federal district) in 2016, giving it full statehood powers. It's one of the largest cities on Earth — 22 million in the metro area.
- Frida Kahlo and Diego Rivera are the city's most iconic artistic figures. Their turbulent marriage and radical politics are inseparable from understanding CDMX's cultural identity.
- Octavio Paz, Carlos Fuentes, and Elena Poniatowska are the literary giants of the city — worth knowing if clients are intellectually curious.

MUST-SEE SITES (with insider context):
- Museo Nacional de Antropología (Chapultepec): The greatest pre-Hispanic collection in the world. The Aztec Sun Stone (often called the "calendar") is here. Go Tuesday–Thursday to avoid weekend crowds. Allow 3 hours minimum — the Aztec and Maya rooms alone are worth a half day. The building itself, designed by Pedro Ramírez Vázquez in 1964, is an architectural masterpiece — the central fountain column supporting the entire roof canopy is stunning.
- Teotihuacán (50km northeast, 1hr drive): Built between 100 BCE and 750 CE — nobody knows who built it. The Aztecs found it already abandoned and named it "the place where the gods were created." Pyramid of the Sun is the third largest pyramid on Earth. Go at opening (9am) before heat and crowds. Hire a private guide — the context transforms the experience. Half day minimum, full day recommended. Offer Suburban or Sprinter transport.
- Castillo de Chapultepec: The only royal castle in North America. It was home to Emperor Maximilian I (a Habsburg, installed by Napoleon III — the French Intervention is a wild chapter of Mexican history). The views over Reforma are spectacular. The murals inside by Siqueiros and O'Gorman are extraordinary.
- Palacio Nacional (Centro): Diego Rivera's 1930s murals depicting the entire history of Mexico cover the main staircase. Free entry. One of the most important works of public art on Earth — clients who know art will be floored.
- Palacio de Bellas Artes: Art Nouveau exterior, Art Deco interior. The stained glass stage curtain made from a million pieces of Tiffany glass depicting the Valley of Mexico is incredible. Home to the Ballet Folklórico de México and world-class opera. Rivera, Orozco, Siqueiros, and Tamayo murals inside.
- Frida Kahlo Museum — La Casa Azul (Coyoacán): Her actual home, preserved almost exactly as she left it. The garden, the kitchen, her wheelchair at the easel. Book tickets 2–3 weeks in advance — they sell out. Pair with a walk through Coyoacán's cobblestone streets and a sit in the jardín.
- Museo Jumex (Polanco/Satélite, Plaza Carso): World-class contemporary art collection — one of the best in Latin America. The David Chipperfield building is extraordinary. Often has major international exhibitions (Warhol, Koons, etc.).
- Museo Soumaya (Plaza Carso): Carlos Slim's free museum — 66,000 pieces including the largest collection of Rodin sculptures outside France. The building (designed by his son-in-law) is polarizing but unmissable. Free entry.
- Xochimilco: UNESCO World Heritage Site. The ancient Aztec chinampas (floating gardens) — the same agricultural system that fed Tenochtitlán. Take a trajinera (colorful gondola-style boat), hire a mariachi band on the water, order food from the boats that approach you. Best on weekend mornings before it gets rowdy. Pure CDMX magic.
- Templo Mayor (Centro): The excavated ruins of the main Aztec temple, right in the heart of Centro — discovered accidentally during telephone line installation in 1978. The adjacent museum has the Coyolxauhqui stone, one of the most important Aztec sculptures ever found.
- Plaza de Tlatelolco / Plaza de las Tres Culturas: Where Aztec ruins, a colonial church, and 1960s modernist housing coexist in one plaza. The massacre memorial is here. Deeply moving and historically complex.

HIDDEN GEMS & LOCAL SECRETS:
- Mercado de Medellín (Roma Sur): Better than a tourist market — locals shop here. Incredible fresh produce, Colombian food stalls, flowers, and a real neighborhood feel. Go in the morning.
- El Péndulo (Roma and Polanco locations): Bookstore-café hybrid. Floor-to-ceiling books, good coffee, live jazz sometimes. Perfect rainy-day stop or a slow afternoon for literary clients.
- Barrio de la Merced: The real wholesale market district — chaotic, colorful, and completely unfiltered CDMX. Not for nervous travelers, but extraordinary for adventurous ones.
- Mercado Jamaica: The city's main flower market. A sea of color at any hour. Romantic for a spontaneous detour.
- Cine Tonalá (Roma Norte): Art house cinema with a great mezcal bar attached. Very local crowd, interesting programming.
- Foro Shakespeare (Condesa): Small, intimate theater — great for catching local theater or comedy.
- Azotea UNAM / Centro Cultural Universitario: If clients are interested in architecture, the UNAM campus (designed by 60 architects including O'Gorman) is a UNESCO site and one of the most beautiful university campuses in the world. The Olympic stadium mosaic by Diego Rivera. Off the tourist radar.
- Parroquia de San Juan Bautista (Coyoacán): The church on the main plaza in Coyoacán — built in 1522, one of the oldest churches in the Americas. Often missed in favor of Frida Kahlo but deeply atmospheric.
- Mirador Torre Latinoamericana: The iconic 1956 skyscraper in Centro. The observation deck gives you the best 360 view of the city — on a clear day after rain you can see Popocatépetl volcano.
- Bosque de Tlalpan: If clients want green space and quiet away from the city — ancient forest in the south, popular with locals on weekends, almost no tourists.
- Mercado del Oro / Mercado Artesanal de Bucareli: Curated artisan goods — Oaxacan textiles, Talavera ceramics, silver jewelry. Better quality than the tourist trinket shops.

FOOD & DRINK CULTURE (beyond the fine dining venues):
- Tacos de canasta: The CDMX breakfast staple — steamed tacos in a basket, sold from bicycles. Best before 11am, gone by noon.
- Tortas de Milanesa: The city's sandwich culture is serious. El Cuadrilátero near Arena México for post-fight tortas is an experience.
- Chilaquiles: The CDMX hangover cure / weekend brunch essential. Red or green salsa, crema, queso fresco, a fried egg. Order them at any local fonda.
- Mezcal culture: CDMX is where serious mezcal drinking happens. La Botica (multiple locations) is the institution — tiny bottles, incredible selection. Expendio de Maíz (Roma) for serious mezcal and Mexican corn cuisine together.
- Café de olla: Mexican spiced coffee brewed in a clay pot with cinnamon and piloncillo. A ritual, not just a drink. Found at any traditional market.
- Mercado de San Juan (Centro): The gourmet market — imported cheeses, Japanese ingredients, exotic meats, incredible prepared food stalls. International residents shop here. Very different from street markets.
- Taquería El Califa de León (2024 Michelin star — the cheapest Michelin-starred meal on Earth, around $3 USD per taco): Carne asada tacos on Altata St, Condesa. Lines but worth it. 

NEIGHBORHOODS AS EXPERIENCES:
- A morning in Roma Norte: Coffee at Quentin, walk Álvaro Obregón, browse El Péndulo, lunch at Contramar or Máximo Bistrot. Ends in Parque México.
- A Coyoacán afternoon: Frida Kahlo Museum → Jardín Centenario (main plaza) → Mercado de Coyoacán for a tostada → mezcal at El Hijo del Cuervo bar on the square.
- A Centro day: Templo Mayor → Palacio Nacional (Rivera murals) → walk to Bellas Artes → café at Gran Hotel → Torre Latinoamericana at sunset.
- A Polanco evening: Museo Jumex → walk Masaryk → drinks at Bar Americano or Living at the W → dinner at Quintonil or Biko.
- A Condesa Sunday: Parque México (farmers market some Sundays) → brunch at any sidewalk café → Avenida Ámsterdam (the oval boulevard built on an old racetrack) → afternoon cocktails at Baltra or Licorería Limantour.

// ─── Language Detection ────────────────────────────────────────────
async function detectLanguage() {
  const COUNTRY_MAP = {
    MX:'es',ES:'es',AR:'es',CO:'es',PE:'es',CL:'es',VE:'es',EC:'es',BO:'es',PY:'es',UY:'es',
    BR:'pt',PT:'pt',FR:'fr',BE:'fr',CH:'fr',DE:'de',AT:'de',JP:'ja',CN:'zh',TW:'zh-TW',KR:'ko',
    SA:'ar',AE:'ar',QA:'ar',KW:'ar',BH:'ar',OM:'ar',EG:'ar',JO:'ar',RU:'ru',UA:'uk',NL:'nl',
    TR:'tr',PL:'pl',SE:'sv',NO:'no',DK:'da',FI:'fi',GR:'el',IL:'he',IN:'hi',TH:'th',VN:'vi',
    ID:'id',MY:'ms',RO:'ro',IR:'fa'
  };
  const BROWSER_MAP = {
    'es':'es','pt':'pt','fr':'fr','de':'de','ja':'ja','zh':'zh','ko':'ko','ar':'ar','ru':'ru',
    'nl':'nl','tr':'tr','pl':'pl','sv':'sv','no':'no','da':'da','fi':'fi','el':'el','he':'he',
    'hi':'hi','th':'th','vi':'vi','id':'id','ms':'ms','uk':'uk','ro':'ro','fa':'fa'
  };

  // 1. Check URL param first (?lang=es)
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  if (urlLang && LANG[urlLang]) { setLang(urlLang); return; }

  // 2. Try IP detection
  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 4000);
    const res = await fetch('https://ipwho.is/', {signal: controller.signal});
    const d = await res.json();
    if (d && d.success !== false) {
      const code = (d.country_code || '').toUpperCase();
      const mapped = COUNTRY_MAP[code];
      if (mapped) { setLang(mapped); return; }
    }
  } catch (_) {}

  // 3. Fallback: browser navigator.language
  try {
    const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    const base = nav.split('-')[0];
    const navMapped = BROWSER_MAP[base];
    if (navMapped && LANG[navMapped]) { setLang(navMapped); return; }
  } catch (_) {}

  // 4. Final fallback
  setLang('en');
}

function setLang(code) {
  if (!LANG[code]) code = 'en';
  currentLang = code;
  document.getElementById('langFlag').textContent = LANG[code].flag;
  document.getElementById('langCode').textContent = code.toUpperCase().slice(0,2);
  document.getElementById('userInput').placeholder = LANG[code].ph;
  document.documentElement.lang = code;
  document.querySelectorAll('.lang-opt').forEach(el => el.classList.toggle('sel', el.dataset.code === code));
  document.body.style.direction = LANG[code].rtl ? 'rtl' : 'ltr';
}

function buildLangMenu() {
  const dd = document.getElementById('langDropdown');
  dd.innerHTML = Object.entries(LANG).map(([code, cfg]) =>
    `<div class="lang-opt${code===currentLang?' sel':''}" data-code="${code}" onclick="setLang('${code}');toggleLangMenu();">${cfg.flag} ${cfg.label}</div>`
  ).join('');
}

function toggleLangMenu() {
  document.getElementById('langDropdown').classList.toggle('open');
}

// ─── Voice ──────────────────────────────────────────────────────
function initVoice() {
  if (!window.speechSynthesis) return;
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
}

function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const clean = text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1')
    .replace(/\[.*?\]\(.*?\)/g,'').replace(/#+\s/g,'').replace(/\[\[.*?\]\]/g,'').slice(0, 600);
  if (!clean.trim()) return;
  const utt = new SpeechSynthesisUtterance(clean);
  utt.rate = 0.93; utt.pitch = 1.0; utt.volume = 0.85;
  const voices = speechSynthesis.getVoices();
  const langPref = {es:'es',fr:'fr',de:'de',pt:'pt',ja:'ja',zh:'zh',ko:'ko',ar:'ar',ru:'ru'};
  const lc = langPref[currentLang] || 'en';
  const v = voices.find(v => v.lang.startsWith(lc) && v.name.includes('Google'))
         || voices.find(v => v.lang.startsWith(lc))
         || voices.find(v => v.lang.startsWith('en'));
  if (v) utt.voice = v;
  speechSynthesis.speak(utt);
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById('voiceBtn').classList.toggle('active', voiceEnabled);
  if (!voiceEnabled) speechSynthesis.cancel();
  showToast(voiceEnabled ? '🔊 Voice on' : '🔇 Voice off');
}

function toggleMic() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) { showToast('Voice input not supported','err'); return; }
  if (micActive) { recognition && recognition.stop(); return; }
  recognition = new SpeechRec();
  recognition.lang = currentLang === 'es' ? 'es-MX' : currentLang === 'fr' ? 'fr-FR' :
    currentLang === 'de' ? 'de-DE' : currentLang === 'pt' ? 'pt-BR' :
    currentLang === 'ja' ? 'ja-JP' : currentLang === 'zh' ? 'zh-CN' :
    currentLang === 'ar' ? 'ar-SA' : currentLang === 'ko' ? 'ko-KR' : 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    document.getElementById('userInput').value = e.results[0][0].transcript;
    document.getElementById('sendBtn').disabled = false;
    autoResize(document.getElementById('userInput'));
    lastInputWasVoice = true;
    sendMessage();
  };
  recognition.onend = () => { micActive = false; updateMicUI(false); };
  recognition.onerror = () => { micActive = false; updateMicUI(false); };
  recognition.start();
  micActive = true;
  updateMicUI(true);
}

function updateMicUI(active) {
  document.getElementById('micBtn').classList.toggle('active', active);
  document.getElementById('micIcon').style.stroke = active ? 'var(--red)' : '';
}

// ═══════════════════════════════════════════════════════════════════════
// SEND MESSAGE — streaming via Cloudflare Worker
// ═══════════════════════════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isThinking) return;
  isThinking = true; input.value = ''; input.style.height = '';
  document.getElementById('sendBtn').disabled = true;
  setStatus('thinking');
  appendMsg('user', text);
  conversationHistory.push({role:'user', content:text});
  showTyping();
  // Compress history if conversation is getting long — prevents Mikey from forgetting
  if (conversationHistory.length > 14) await compressHistory();

  const isVoice = lastInputWasVoice;
  lastInputWasVoice = false;
  const maxTok = isVoice ? 500 : 1100;
  const sysPrompt = buildSystemPrompt(currentLang, null, isVoice);
  let fullText = '';
  let streamBubble = null;
  try {
    const res = await fetch(`${CONFIG.WORKER_URL}/api/messages`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:maxTok,
        stream:true,
        system:sysPrompt,
        messages:conversationHistory,
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    hideTyping();
    streamBubble = createStreamBubble();
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim();
        if (d === '[DONE]') continue;
        try {
          const parsed = JSON.parse(d);
          if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
            fullText += parsed.delta.text;
            updateStreamBubble(streamBubble, fullText);
          }
        } catch {}
      }
    }
  } catch (err) {
    try {
      hideTyping();
      const res2 = await fetch(`${CONFIG.WORKER_URL}/api/messages`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,system:sysPrompt,messages:conversationHistory})
      });
      const data = await res2.json();
      fullText = data.content?.map(b=>b.text||'').join('') || '';
      if (!streamBubble) streamBubble = createStreamBubble();
      updateStreamBubble(streamBubble, fullText);
    } catch (err2) {
      hideTyping();
      const errMsgs = {es:'Hubo un problema. Por favor intente de nuevo.',en:'Connection issue — please try again.',fr:'Erreur de connexion.',de:'Verbindungsfehler.',pt:'Erro de conexão.',ja:'接続エラーが発生しました。',zh:'连接出现问题，请重试。',ar:'حدث خطأ في الاتصال.',ko:'연결 오류가 발생했습니다.'};
      appendMsg('assistant', errMsgs[currentLang] || errMsgs.en);
      isThinking = false; setStatus('online'); return;
    }
  }
  if (streamBubble) finalizeStream(streamBubble, fullText);
  processResponse(fullText);
  isThinking = false; setStatus('online');
  document.getElementById('userInput').focus();
}

// ═══════════════════════════════════════════════════════════════════════
// SIGNAL PROCESSOR — v5.4: 15 signals total
// ═══════════════════════════════════════════════════════════════════════
function processResponse(raw) {
  // ── CLIENT_INFO ──────────────────────────────────────────────────
  const ciMatch = raw.match(/\[\[CLIENT_INFO:([^\]]+)\]\]/);
  if (ciMatch) {
    const [name,email,phone,pax] = ciMatch[1].split('|');
    clientInfo = {name:name||'',email:email||'',phone:phone||'',pax:parseInt(pax)||1};
  }

  // ── SAVE_CLIENT ──────────────────────────────────────────────────
  if (raw.includes('[[SAVE_CLIENT]]') && !sessionFlags.clientSaved) {
    sessionFlags.clientSaved = true;
    saveClientToBackend();
  }

  // ── VIP_FLAG ─────────────────────────────────────────────────────
  const vipMatch = raw.match(/\[\[VIP_FLAG:([^\]]+)\]\]/);
  if (vipMatch && !sessionFlags.isVIP) {
    sessionFlags.isVIP = true;
    activateVIPMode(vipMatch[1]);
  }

  // ── QUOTE ────────────────────────────────────────────────────────
  const qMatch = raw.match(/\[\[QUOTE:([^\]]+)\]\]/);
  if (qMatch) {
    const q = parseAndBuildQuote(qMatch[1]);
    if (q) {
      appendQuoteCard(q);
      sessionFlags.runningTotal += q.total;
      // Auto-trigger VIP check on total
      if (sessionFlags.runningTotal >= CONFIG.VIP_SPEND_THRESHOLD && !sessionFlags.isVIP) {
        sessionFlags.isVIP = true;
        activateVIPMode(`Session total $${sessionFlags.runningTotal.toFixed(0)}`);
      }
    }
  }

  // ── MULTI_QUOTE ──────────────────────────────────────────────────
  const mqMatch = raw.match(/\[\[MULTI_QUOTE:([^\]]+)\]\]/);
  if (mqMatch) {
    const parts = mqMatch[1].split('|');
    const keys = parts[0].split(',');
    const rest = parts.slice(1).join('|');
    appendMultiQuoteCard(keys, rest);
  }

  // ── LEG_COUNT ────────────────────────────────────────────────────
  const lcMatch = raw.match(/\[\[LEG_COUNT:(\d+)\]\]/);
  if (lcMatch) {
    sessionFlags.legCount = parseInt(lcMatch[1]);
    appendLegTracker(sessionFlags.legCount, sessionFlags.runningTotal);
  }

  // ── ITINERARY_READY ──────────────────────────────────────────────
  if (raw.includes('[[ITINERARY_READY]]')) appendItineraryCard();

  // ── OPEN_BOOKING ─────────────────────────────────────────────────
  if (raw.includes('[[OPEN_BOOKING]]')) triggerBookingFlow();

  // ── DRIVER_ASSIGN ────────────────────────────────────────────────
  const daMatch = raw.match(/\[\[DRIVER_ASSIGN:([^\]]+)\]\]/);
  if (daMatch) {
    const [name, eta, vehicle] = daMatch[1].split('|');
    appendDriverCard(name.trim(), eta.trim(), vehicle.trim());
  }

  // ── WHATSAPP_HANDOFF ─────────────────────────────────────────────
  if (raw.includes('[[WHATSAPP_HANDOFF]]') && !sessionFlags.handoffOffered) {
    sessionFlags.handoffOffered = true;
    appendWhatsAppHandoff();
  }

  // ── SECURITY_BRIEF ───────────────────────────────────────────────
  const sbMatch = raw.match(/\[\[SECURITY_BRIEF:([^\]]+)\]\]/);
  if (sbMatch) appendSecurityBrief(sbMatch[1].trim());

  // ── UPSELL ───────────────────────────────────────────────────────
  const usMatch = raw.match(/\[\[UPSELL:([^\]]+)\]\]/);
  if (usMatch && !sessionFlags.venueOffered) {
    sessionFlags.venueOffered = true;
    appendUpsellCard(usMatch[1].trim());
  }

  // ── CONCIERGE_BRIEF ──────────────────────────────────────────────
  const cbMatch = raw.match(/\[\[CONCIERGE_BRIEF:([^\]]+)\]\]/);
  if (cbMatch) appendConciergeCard(cbMatch[1].trim());

  // ── VIP_ACCESS_BRIEF ─────────────────────────────────────────────
  if (raw.includes('[[VIP_ACCESS_BRIEF]]')) appendVIPAccessCard();

  // ── RECOMMEND_VENUES ─────────────────────────────────────────────
  const rvMatch = raw.match(/\[\[RECOMMEND_VENUES:(.*?)\]\]/);
  if (rvMatch) appendVenueCards(rvMatch[1]);

  // ── SUGGEST_ITINERARY ────────────────────────────────────────────────
  const itinMatch = raw.match(/\[\[SUGGEST_ITINERARY:([^\]]+)\]\]/);
  if (itinMatch) {
    const [framework, days, pax, interests] = itinMatch[1].split('|');
    appendItineraryPlanCard(framework.trim(), parseInt(days)||1, parseInt(pax)||2, interests||'');
  }

  // ── BOOK_VENUE ───────────────────────────────────────────────────
  const bvMatch = raw.match(/\[\[BOOK_VENUE:([^\]]+)\]\]/);
  if (bvMatch) {
    const [vid, spend] = bvMatch[1].split('|');
    sendVenueReservation(vid, parseFloat(spend)||0);
  }

  // ── SUGGESTIONS ──────────────────────────────────────────────────
  const sMatch = raw.match(/\[\[SUGGESTIONS:([^\]]+)\]\]/);
  if (sMatch) appendChips(sMatch[1].split('|').filter(Boolean));

  // ── Voice output ──────────────────────────────────────────────────
  const cleanText = raw.replace(/\[\[.*?\]\]/g,'').replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').trim();
  speak(cleanText);

  // ── Store in history (strip signals) ─────────────────────────────
  conversationHistory.push({role:'assistant',content:raw.replace(/\[\[.*?\]\]/g,'').trim()});
}

// ═══════════════════════════════════════════════════════════════════════
// QUOTE BUILDER
// ═══════════════════════════════════════════════════════════════════════
function parseAndBuildQuote(str) {
  const [vehicleKey,serviceType,hours,miles,greeters,extraStops,waitMins] = str.split('|');
  const veh = PRICING[vehicleKey];
  if (!veh) return null;
  let total = 0, label = '';
  const h = parseFloat(hours)||0, m = parseFloat(miles)||0;
  const g = parseInt(greeters)||0, es = parseInt(extraStops)||0, wm = parseInt(waitMins)||0;
  if (serviceType === 'hourly') {
    const hrs = Math.max(h, veh.minHours);
    total = hrs * veh.hourly;
    label = `${hrs}hr Hourly Service`;
  } else if (serviceType === 'transfer') {
    total = m * veh.perMile;
    label = `Point-to-Point Transfer · ~${m} mi`;
  } else if (serviceType === 'airport_aicm') {
    total = veh.aicm;
    label = 'Airport Transfer — AICM';
  } else if (serviceType === 'airport_aifa') {
    total = veh.aifa;
    label = 'Airport Transfer — AIFA';
  }
  if (g) total += g * ADDONS.greeter;
  if (es) total += es * ADDONS.extraStop;
  if (wm) total += wm * ADDONS.waitPerMin;
  const confNum = 'MCBC-' + Date.now().toString(36).toUpperCase();
  lastQuote = {vehicleKey,veh,serviceType,label,total,confNum,hours:h,miles:m,greeters:g,extraStops:es};
  pendingConfirmNum = confNum;
  return lastQuote;
}

function calcQuoteTotal(vehicleKey, serviceStr) {
  // Helper for multi-quote comparison — reuses same logic
  const [serviceType,hours,miles,greeters,extraStops,waitMins] = serviceStr.split('|');
  const veh = PRICING[vehicleKey];
  if (!veh) return 0;
  let total = 0;
  const h = parseFloat(hours)||0, m = parseFloat(miles)||0;
  const g = parseInt(greeters)||0, es = parseInt(extraStops)||0, wm = parseInt(waitMins)||0;
  if (serviceType === 'hourly') total = Math.max(h, veh.minHours) * veh.hourly;
  else if (serviceType === 'transfer') total = m * veh.perMile;
  else if (serviceType === 'airport_aicm') total = veh.aicm;
  else if (serviceType === 'airport_aifa') total = veh.aifa;
  if (g) total += g * ADDONS.greeter;
  if (es) total += es * ADDONS.extraStop;
  if (wm) total += wm * ADDONS.waitPerMin;
  return total;
}

// BACKEND CRM SAVE — stub ready for IT to wire to FastAPI
// ═══════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════
// MEMORY COMPRESSION — prevents context drift after many turns
// Fires when conversationHistory exceeds 14 messages.
// Compresses oldest messages into a bullet summary, keeps last 10 fresh.
// ═══════════════════════════════════════════════════════════════════════
async function compressHistory() {
  if (conversationHistory.length <= 14) return;

  const toCompress = conversationHistory.slice(0, conversationHistory.length - 10);
  const keepRecent = conversationHistory.slice(conversationHistory.length - 10);

  const summaryPrompt = `Summarize this conversation in 4-5 bullet points. Preserve: client name, group size, hotel, trip dates, vehicles quoted, confirmation numbers, venues discussed, any special occasion (anniversary, birthday etc), open issues, and any decisions made. Be terse — this is a memory digest for an AI concierge.\n\n${toCompress.map(m => m.role.toUpperCase() + ': ' + m.content).join('\n')}`;

  try {
    const res = await fetch(CONFIG.WORKER_URL + '/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        messages: [{ role: 'user', content: summaryPrompt }]
      })
    });
    const data = await res.json();
    const summary = data.content?.map(b => b.text || '').join('') || '';
    if (summary) {
      conversationHistory = [
        { role: 'user',      content: '[Earlier conversation summary]\n' + summary },
        { role: 'assistant', content: 'Got it — I have the full context from our earlier conversation.' },
        ...keepRecent
      ];
      console.log('[Mikey Memory] History compressed —', toCompress.length, 'messages summarized');
    }
  } catch(e) {
    // Silent fail — just trim to recent messages
    conversationHistory = keepRecent;
    console.warn('[Mikey Memory] Compression failed, trimmed to recent:', e);
  }
}

async function saveClientToBackend() {
  if (!clientInfo.email || !CONFIG.BACKEND_URL || CONFIG.BACKEND_URL === 'YOUR_BACKEND_URL_HERE') {

      headers:{'Content-Type':'application/json'},

        ...clientInfo,
        source:'mikey-cdmx',

function createStreamBubble() {
  hideTyping();

  bub.innerHTML = '';
  body.appendChild(bub); wrap.appendChild(av); wrap.appendChild(body);

function updateStreamBubble(bub, text) {
  const clean = text.replace(/\[\[.*?\]\]/g,'').trim();
  bub.innerHTML = renderMd(clean);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function finalizeStream(bub, text) {
  bub.classList.remove('streaming');
  const clean = text.replace(/\[\[.*?\]\]/g,'').trim();
  bub.innerHTML = renderMd(clean);
}

// STRIPE CHECKOUT
// ═══════════════════════════════════════════════════════════════════════
async function initiateCheckout(confNum) {
  if (!lastQuote) return;
  const btn = document.getElementById(`payBtn-${confNum}`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const res = await fetch(`${CONFIG.WORKER_URL}/checkout`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        line_items:[{price_data:{currency:'usd',product_data:{name:`${lastQuote.veh.name} — ${lastQuote.label}`,description:`San Diego Black Car · Ref: ${lastQuote.confNum}`},unit_amount:Math.round(lastQuote.total*100)},quantity:1}],
        mode:'payment',
        customer_email: clientInfo.email || undefined,
        metadata:{confirmation_number:lastQuote.confNum,market:'cdmx',vehicle:lastQuote.vehicleKey,is_vip:sessionFlags.isVIP},
      })
    });
    const {url, error} = await res.json();
    if (error) throw new Error(error);
    window.location.href = url;
  } catch (err) {
    showToast('Payment error — please try again','err');
    if (btn) { btn.disabled = false; btn.textContent = LANG[currentLang].payBtn; }
  }
}

function holdQuote(confNum) {
  if (!lastQuote) return;
  showToast('Quote saved — valid 48 hours ✓','ok');
}

// EMAIL — 3-way split
// ═══════════════════════════════════════════════════════════════════════
async function triggerBookingFlow() {
  if (!lastQuote || !clientInfo.email) return;
  const cn = lastQuote.confNum;
  const summary = `${lastQuote.veh.name} · ${lastQuote.label} · $${lastQuote.total.toFixed(2)} USD`;
  const params = {
    confirmation_number: cn,
    client_name: clientInfo.name || 'Valued Client',
    client_email: clientInfo.email,
    client_phone: clientInfo.phone || 'N/A',
    vehicle: lastQuote.veh.name,
    service_label: lastQuote.label,
    total_amount: `$${lastQuote.total.toFixed(2)} USD`,
    trip_summary: summary,
    company: CONFIG.COMPANY_NAME,
    phone: CONFIG.COMPANY_PHONE,
    website: CONFIG.COMPANY_WEBSITE,
    booking_date: new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    is_vip: sessionFlags.isVIP ? 'YES — PRIORITY SERVICE' : 'Standard',
  };
  try {
    await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TMPL_CLIENT, {...params, to_email:clientInfo.email, to_name:clientInfo.name||'Valued Client'});
    await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TMPL_EXEC, {...params, to_email:CONFIG.EXEC_EMAIL, to_name:'James'});
    await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TMPL_OPS, {
      confirmation_number:cn, vehicle:lastQuote.veh.name, service_label:lastQuote.label,
      client_name:clientInfo.name||'N/A', pax:clientInfo.pax||'N/A',
      is_vip: sessionFlags.isVIP ? 'YES' : 'No',
      to_email:CONFIG.OPS_EMAIL, to_name:'Operations'
    });
    showToast('Confirmation sent ✓','ok');
    // Also save booking to backend
    saveBookingToBackend(cn, params);
  } catch(e) { console.warn('Email error',e); }
}

async function saveBookingToBackend(confNum, params) {
  if (!CONFIG.BACKEND_URL || CONFIG.BACKEND_URL === 'YOUR_BACKEND_URL_HERE') {
    console.log('[ILT BOOKING] Backend URL not configured — booking save skipped');
    return;
  }
  try {
    await fetch(`${CONFIG.BACKEND_URL}/api/bookings`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        confirmation_number: confNum,
        client_email: clientInfo.email,
        client_name: clientInfo.name,
        vehicle_key: lastQuote?.vehicleKey,
        service_type: lastQuote?.serviceType,
        total_usd: lastQuote?.total,
        is_vip: sessionFlags.isVIP,
        session_total: sessionFlags.runningTotal,
        market: CONFIG.MARKET,
        status: 'confirmed',
        timestamp: new Date().toISOString(),
      })
    });
    console.log('[ILT BOOKING] Booking saved:', confNum);
  } catch(e) { console.warn('[ILT BOOKING] Save failed:', e); }
}

async function sendVenueReservation(venueId, estimatedSpend) {
  const venue = [...VENUES.dinner,...VENUES.nightlife].find(v=>v.id===venueId);
  if (!venue) return;
  const comm = (estimatedSpend * venue.commission).toFixed(2);
  try {
    await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TMPL_VENUE, {
      venue_name:venue.name, venue_email:venue.email,
      client_name:clientInfo.name||'Client of San Diego Black Car',
      client_count:clientInfo.pax||2,
      iata_number:CONFIG.IATA_NUMBER,
      commission_rate:`${(venue.commission*100).toFixed(0)}%`,
      company:CONFIG.COMPANY_NAME,
      to_email:venue.email, to_name:`${venue.name} Reservations`,
    });
    await emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TMPL_COMMISSION, {
      venue_name:venue.name, estimated_spend:`$${estimatedSpend}`,
      commission_rate:`${(venue.commission*100).toFixed(0)}%`,
      commission_estimate:`$${comm}`,
      to_email:CONFIG.OPS_EMAIL,
    });
    showToast(`Reservation request sent to ${venue.name} ✓`,'ok');
  } catch(e) { console.warn('Venue email error',e); }
}

function selectVenue(venueId, spend) {
  const venue = [...VENUES.dinner,...VENUES.nightlife].find(v=>v.id===venueId);
  if (!venue) return;
  const msg = `I'd like to reserve a table at ${venue.name} for ${clientInfo.pax||2} guests. Estimated spend $${spend}.`;
  document.getElementById('userInput').value = msg;
  document.getElementById('sendBtn').disabled = false;
  sendMessage();
}

// ═══════════════════════════════════════════════════════════════════════
// FILE UPLOAD
// ═══════════════════════════════════════════════════════════════════════
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  document.getElementById('uploadName').textContent = file.name;
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let parsed = '';
      if (ext === 'csv' || ext === 'txt') {
        const result = Papa.parse(e.target.result, {header:true, skipEmptyLines:true});
        parsed = JSON.stringify(result.data.slice(0,50), null, 2);
      } else if (ext === 'xlsx' || ext === 'xls') {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''}).slice(0,50);
        parsed = JSON.stringify(rows, null, 2);
      }
      if (parsed) {
        const msg = `I've uploaded a file called "${file.name}". Here is the data:\n\`\`\`\n${parsed}\n\`\`\`\nPlease help me create quotes for this itinerary.`;
        document.getElementById('userInput').value = msg;
        document.getElementById('sendBtn').disabled = false;
        sendMessage();
      }
    } catch(err) { showToast('Could not parse file','err'); }
  };
  if (ext === 'xlsx' || ext === 'xls') reader.readAsArrayBuffer(file);
  else reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════
function setStatus(s) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (s==='thinking'?' thinking':s==='offline'?' offline':'');
}

function renderMd(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^#{1,3}\s(.+)/gm,'<strong>$1</strong>')
    .replace(/^[-•]\s(.+)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, s => `<ul>${s}</ul>`)
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br/>')
    .replace(/^(.)/,'<p>$1').replace(/(.)$/,'$1</p>');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type?' '+type:'');
  setTimeout(()=> t.className = 'toast', 3500);
}

function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
