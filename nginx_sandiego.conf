# ─────────────────────────────────────────────────────────────────────────────
# San Diego Black Car — Nginx Configuration
# Infinite Logistic Technologies · sdblackcar-tech/SanDiego-Mike-AI
# Droplet: DigitalOcean · Deploy via GitHub push (never edit on server)
#
# SERVER BLOCKS
#   1. sandiegoblackcarservice.com      — main public site
#   2. www.sandiegoblackcarservice.com  — redirect → apex
#   3. ops.sandiegoblackcarservice.com  — internal ops portal
#   4. login.sandiegoblackcarservice.com — JWT login page
#
# NOTE: api.sandiegoblackcarservice.com is a CNAME → DO App Platform.
#       It does NOT need an nginx block on this droplet.
# ─────────────────────────────────────────────────────────────────────────────


# ── 1. MAIN SITE ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name sandiegoblackcarservice.com;
    root /var/www/sandiegoblackcar;
    index index.html;

    # Static pages
    location = /         { try_files /index.html =404; }
    location = /about    { try_files /about.html =404; }
    location = /terms    { try_files /terms.html =404; }
    location = /mikey    { try_files /mikey.html =404; }
    location = /blog     { try_files /blog.html =404; }

    # API proxy → FastAPI (mikey.service on port 8000)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /webhooks/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}


# ── 2. WWW REDIRECT ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name www.sandiegoblackcarservice.com;
    return 301 http://sandiegoblackcarservice.com$request_uri;
}


# ── 3. OPS PORTAL ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name ops.sandiegoblackcarservice.com;
    root /var/www/sandiegoblackcar;
    index portal.html;

    # Auth guard — serve portal shell; React/JS handles role check via JWT
    location = / { try_files /portal.html =404; }

    # API proxy (same backend, CORS already includes this subdomain)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Unauthenticated requests redirect to login
    error_page 401 403 = @require_login;
    location @require_login {
        return 302 http://login.sandiegoblackcarservice.com;
    }

    gzip on;
}


# ── 4. LOGIN PAGE ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name login.sandiegoblackcarservice.com;
    root /var/www/sandiegoblackcar;
    index login.html;

    location = / { try_files /login.html =404; }

    # Login posts JWT request directly to API
    location /api/auth/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_read_timeout 30s;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
}
